<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adaptive Diagnostic — Student Case Study</title>
<style>
  :root{
    --ink:#1a1d27; --sub:#6b7080; --line:#e6e8ef; --bg:#f4f5f9; --card:#ffffff;
    --accent:#4f46e5; --accent-soft:#eef0fe;
    --ok:#0f766e; --ok-soft:#e6f4f2;
    --warn:#b45309; --warn-soft:#fdf3e3;
    --bad:#b42318; --bad-soft:#fdeceb;
    --mut:#9aa0ae;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--ink); line-height:1.5; padding:32px 20px 64px;}
  .wrap{max-width:760px; margin:0 auto;}
  header{margin-bottom:20px;}
  .tag{display:inline-block; font-size:11px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:var(--accent); background:var(--accent-soft); border-radius:99px; padding:3px 10px; margin-bottom:10px;}
  header h1{font-size:20px; font-weight:700; letter-spacing:-0.01em;}

  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:24px;}

  .context{border-left:3px solid var(--warn); padding:14px 18px; background:var(--warn-soft); border-radius:10px; margin-bottom:18px; font-size:14px;}
  .context b{display:block; margin-bottom:2px;}

  .onboard h2{font-size:19px; font-weight:700; margin-bottom:14px;}
  .onboard-step{display:flex; gap:12px; align-items:flex-start; padding:14px 0; border-bottom:1px solid var(--line);}
  .onboard-step:last-of-type{border-bottom:none;}
  .onboard-step .num{flex:none; width:26px; height:26px; border-radius:99px; background:var(--accent-soft); color:var(--accent); font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center;}
  .onboard-step p{font-size:15px; padding-top:2px;}

  .skill-roadmap{margin-top:20px;}
  .skill-row{padding:16px; border:1.5px solid var(--line); border-radius:10px; margin-bottom:10px;}
  .skill-row.done{border-color:transparent; background:var(--ok-soft);}
  .skill-row.current{border-color:var(--accent); background:var(--accent-soft);}
  .skill-row.locked{opacity:.5;}
  .skill-row .skill-name{font-size:15px; font-weight:700;}
  .skill-row .skill-blurb{margin-top:4px; font-size:13px; color:var(--sub);}
  .skill-row .done-label{margin-top:6px; font-size:13px; font-weight:600; color:var(--ok);}
  .skill-row .skill-start-btn{margin-top:12px;}

  .skill-chip{font-size:12px; font-weight:600; color:var(--sub); margin-bottom:6px;}
  .prompt{font-size:18px; font-weight:600; margin:10px 0 20px;}
  .qcount{font-size:12px; font-weight:600; color:var(--mut); margin-bottom:6px;}

  .opt{display:flex; align-items:center; gap:12px; width:100%; text-align:left; font-size:16px; font-family:inherit; background:var(--card); border:1.5px solid var(--line); border-radius:10px; padding:14px 16px; margin-bottom:10px; cursor:pointer; transition:border-color .15s, background .15s;}
  .opt:hover:not(:disabled){border-color:var(--accent); background:var(--accent-soft);}
  .opt .key{flex:none; width:26px; height:26px; border-radius:7px; background:var(--bg); color:var(--sub); font-size:13px; font-weight:600; display:flex; align-items:center; justify-content:center;}
  .opt.selected{border-color:var(--accent); background:var(--accent-soft);}
  .opt.selected .key{background:var(--accent); color:#fff;}
  .opt:disabled{cursor:default;}
  .opt.chosen-correct{border-color:var(--ok); background:var(--ok-soft);}
  .opt.chosen-correct .key{background:var(--ok); color:#fff;}
  .opt.chosen-wrong{border-color:var(--bad); background:var(--bad-soft);}
  .opt.chosen-wrong .key{background:var(--bad); color:#fff;}
  .opt.reveal-correct{border-color:var(--ok); border-style:dashed;}

  .steps{display:flex; gap:6px; margin-bottom:18px; flex-wrap:wrap;}
  .step{font-size:12px; font-weight:600; color:var(--sub); background:var(--bg); border-radius:99px; padding:4px 12px;}
  .step.now{color:#fff; background:var(--accent);}

  .btn{display:inline-block; font-family:inherit; font-size:15px; font-weight:600; color:#fff; background:var(--accent); border:none; border-radius:10px; padding:12px 24px; cursor:pointer;}
  .btn.ghost{color:var(--accent); background:var(--accent-soft);}
  .btn:disabled{opacity:.4; cursor:not-allowed;}
  .submit-row{margin-top:6px;}

  .diag-cause{display:inline-block; font-size:12px; font-weight:700; letter-spacing:.03em; text-transform:uppercase; border-radius:99px; padding:5px 14px; margin-bottom:14px;}
  .diag-cause.ok{color:var(--ok); background:var(--ok-soft);}
  .diag-cause.warn{color:var(--warn); background:var(--warn-soft);}
  .diag-cause.bad{color:var(--bad); background:var(--bad-soft);}
  .diag h2{font-size:20px; font-weight:700; margin-bottom:8px;}
  .diag>p{font-size:14.5px; color:var(--sub); margin-bottom:22px;}

  .ladder{margin-bottom:22px;}
  .ladder h3, .lesson h3, .steps-box b{font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--sub); margin-bottom:10px; display:block;}
  .rung{display:flex; align-items:center; gap:10px; font-size:14px; padding:9px 12px; border-radius:9px; margin-bottom:6px; border:1px solid var(--line);}
  .rung .mark{flex:none; width:22px; height:22px; border-radius:99px; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center;}
  .rung.solid{background:var(--ok-soft); border-color:transparent;}
  .rung.solid .mark{background:var(--ok); color:#fff;}
  .rung.broken{background:var(--bad-soft); border-color:var(--bad);}
  .rung.broken .mark{background:var(--bad); color:#fff;}
  .rung.blocked{color:var(--mut);}
  .rung.blocked .mark{background:var(--bg); color:var(--mut);}
  .rung.assumed{color:var(--sub);}
  .rung.assumed .mark{background:var(--bg); color:var(--sub);}
  .rung .note{margin-left:auto; font-size:11.5px; font-weight:600; color:var(--bad);}
  .rung.solid .note{color:var(--ok);}
  .rung.assumed .note, .rung.blocked .note{color:var(--mut); font-weight:500;}

  .lesson ol{padding-left:20px;}
  .lesson li{font-size:14px; margin-bottom:6px;}
  .lesson .none{font-size:14px; color:var(--sub);}

  .gen{display:flex; flex-direction:column; gap:10px; padding:14px 0 8px;}
  .gen .bar{height:12px; border-radius:6px; background:var(--accent-soft); overflow:hidden; position:relative;}
  .gen .bar::after{content:""; position:absolute; inset:0; background:var(--accent); opacity:.35; transform:translateX(-100%); animation:sh 1.1s ease-in-out infinite;}
  @keyframes sh{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}
  .gen .cap{font-size:13px; color:var(--sub); margin-top:4px;}

  .rail{display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap;}
  .rail .r{display:flex; align-items:center; gap:8px; font-size:12.5px; font-weight:600; padding:6px 12px 6px 8px; border-radius:99px; border:1px solid var(--line); color:var(--sub);}
  .rail .r .d{flex:none; width:19px; height:19px; border-radius:99px; display:flex; align-items:center; justify-content:center; font-size:11px; background:var(--bg);}
  .rail .r.active{color:var(--accent); border-color:var(--accent); background:var(--accent-soft);}
  .rail .r.active .d{background:var(--accent); color:#fff;}
  .rail .r.done{color:var(--ok); border-color:transparent; background:var(--ok-soft);}
  .rail .r.done .d{background:var(--ok); color:#fff;}
  .rail .r.locked{opacity:.5;}

  .banner{font-size:13px; font-weight:600; border-radius:9px; padding:10px 13px; margin-bottom:16px;}
  .banner.regen{color:var(--accent); background:var(--accent-soft);}
  .banner.insert{color:var(--warn); background:var(--warn-soft);}

  .theory{font-size:15px; margin-bottom:14px;}
  .steps-box{font-size:14px; background:var(--bg); border-radius:10px; padding:12px 14px; margin-bottom:14px;}
  .steps-box ol{padding-left:18px; margin-top:4px;}
  .steps-box li{margin-bottom:4px;}
  .example{font-size:14px; background:var(--bg); border-radius:10px; padding:12px 14px; margin-bottom:18px;}
  .example ul{padding-left:18px; margin-top:6px;}
  .example li{margin-bottom:6px;}
  .meter{font-size:12.5px; color:var(--sub); margin-bottom:14px;}
  .feedback{font-size:14.5px; font-weight:600; padding:12px 14px; border-radius:9px; margin:14px 0;}
  .feedback.good{color:var(--ok); background:var(--ok-soft);}
  .feedback.hint{color:var(--warn); background:var(--warn-soft);}

  .coach-card{border-left:3px solid var(--bad); background:var(--bad-soft); padding:16px 18px; border-radius:10px;}
  .coach-card h2{font-size:19px; font-weight:700; margin:6px 0 8px;}
  .slots{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:14px 0;}
  .slot{font-size:13.5px; font-weight:600; text-align:center; padding:10px; border-radius:8px; border:1.5px solid var(--line); background:var(--card); color:var(--ink);}

  .feedback-input{width:100%; font-family:inherit; font-size:14px; padding:12px 14px; border:1.5px solid var(--line); border-radius:10px; margin:14px 0; resize:vertical;}
  .feedback-input:focus{outline:none; border-color:var(--accent);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="tag">Prototype · pre-scripted branching, seeded with real data</span>
    <h1>Adaptive Diagnostic</h1>
  </header>

  <div class="card" id="stage"></div>
</div>

<script>
/* ---------------------------------------------------------------- */
/* Scenario data — one real student's two priority skills, run in order */
/* (verb tense first — his lowest at 22.9% — then guide words)       */
/* ---------------------------------------------------------------- */

const QUESTIONS_PER_TOPIC = 10;

const SCENARIOS = {

  verbTense: {
    label: "Perfect verb tense",
    blurb: "Showing one past action happened before another, using had/has/have with the right participle.",
    topFullTopic: "verb_tense_full",
    TOPIC_TITLE: {
      timeline: "Placing events on a timeline",
      participles: "Past participle forms",
      combine: "Combining has/have/had + participle",
      verb_tense_full: "Perfect verb tense (re-climb)"
    },
    PREREQ: { verb_tense_full: "combine", combine: "participles", participles: "timeline" },
    THEORY: {
      timeline: {
        approaches: [
          "Most sentences describe one thing happening. But sometimes a sentence needs to show that ONE past event happened BEFORE another past event — not just that both happened in the past, but which one came first. That's exactly the situation perfect tense is built for.",
          "Picture a line: Past — Present — Future. Now imagine a second, earlier point on the past side — that's the 'past before the past' moment perfect tense marks.",
          "Look for a signal phrase — words like 'by the time,' 'already,' or 'before X happened' are the sentence telling you there are two past moments, not one. Whichever action the signal phrase points to as the EARLIER one needs 'had' plus the past participle.",
          "Think about how you'd tell a friend a story out of order — 'oh wait, I forgot to say, this had already happened.' That backtracking word 'had' is exactly what marks the earlier event when you're describing two things that happened in the past."
        ],
        steps: ["Look for two events in the sentence, both in the past.", "Figure out which one happened first.", "The earlier event gets 'had' + the past participle to mark it as happening before the other one."],
        examples: [
          "'I had already eaten dinner when she arrived' — eating dinner happened first, then arriving happened. 'Had eaten' marks the earlier event.",
          "'By noon, he had left the building' — leaving happened before noon (the reference point), so it gets 'had left'."
        ]
      },
      participles: {
        approaches: [
          "Perfect tense always pairs a helper word (has, have, or had) with a special form of the verb called the past participle. Regular verbs just add -ed (walk → walked), but a lot of common verbs are irregular — their past participle doesn't follow that pattern, and guessing '-ed' gets it wrong.",
          "Think of each irregular verb as having its own partner word for has/have/had — write's partner is written, go's partner is gone, not the -ed you'd expect.",
          "Irregular verbs aren't random — many follow small families with the same vowel shift. 'Speak → spoke → spoken' and 'break → broke → broken' share the same pattern; 'grow → grew → grown' and 'know → knew → known' share another. Learning one verb in a family helps you guess the others.",
          "Every verb has three key forms: the plain form (go), the simple past (went), and the past participle (gone) — and for irregular verbs, all three can look completely different. Perfect tense always needs that third form, the past participle, never the simple past."
        ],
        steps: ["Check if the verb is regular (just add -ed) or irregular.", "For irregular verbs, the participle has to be learned — it doesn't follow a rule.", "Never regularize an irregular verb by adding -ed to it."],
        examples: [
          "'go' → 'gone' (has gone), not 'goed'.",
          "'write' → 'written' (has written), not 'writed'."
        ]
      },
      combine: {
        approaches: [
          "Perfect tense is always: has/have/had + past participle. Which helper word you use depends on timing — has or have for something that happened in the past but still matters now (present perfect), and had for something that happened before another past event (past perfect).",
          "It's a two-piece puzzle: pick the right helper word for when it happened, then attach the correct participle for the verb.",
          "Ask yourself: does this matter right now, in the present? If yes — 'She has finished, so she's free tonight' — use has/have. Does it only matter compared to another moment in the past? If yes — 'She had finished before dinner' — use had. The helper word answers 'relevant to when?'",
          "Run two quick questions: is there another past moment mentioned in the sentence to compare against (a 'before X' relationship)? If yes, that calls for had. If there's no second past moment and the sentence is just saying something is true up to now, that calls for has/have."
        ],
        steps: ["Decide: is this 'still relevant now' (present perfect) or 'before another past event' (past perfect)?", "Pick has/have for present perfect, had for past perfect.", "Attach the correct past participle — never the plain past-tense form."],
        examples: [
          "'She has finished her homework' — present perfect: it's done, and that matters right now.",
          "'She had finished before dinner' — past perfect: it was done before another past moment."
        ]
      },
      verb_tense_full: {
        approaches: [
          "Putting the whole thing together: first figure out the timing, then pick the right helper word, then attach the correct past participle for that verb — not the plain past tense, and not a regularized -ed guess.",
          "Same three-step puzzle, put together: when did it happen relative to now or another event, which helper word matches, which participle matches the verb.",
          "Take one sentence and walk it through fully: 'By the time the bell rang, the class had read the entire chapter.' First — is there a second past moment? Yes, the bell ringing. Second — did the reading happen before or after? Before. Third — so it needs 'had' plus the participle 'read.' Every perfect-tense sentence follows that same three-question walk.",
          "The three things that trip people up: using the plain past tense when there's a 'before' relationship (should be had), regularizing an irregular verb by adding -ed, and using has/have when the sentence is really about something before another past moment. Checking for these three specifically catches most mistakes."
        ],
        steps: ["Identify the timing signal — is there a 'before' relationship, or just an ongoing 'already' relevance?", "Choose had (past-before-past) or has/have (present relevance).", "Use the correct past participle for the verb."],
        examples: [
          "'By the time the bell rang, the class had read the entire chapter' — reading finished before the bell, so 'had' + 'read'.",
          "'He has traveled to three countries' — an ongoing fact that still matters now, so 'has' + 'traveled'."
        ]
      }
    },
    QUESTION_BANK: {
      timeline: [
        { prompt: "Which sentence describes something that happened BEFORE another past event?", options: [{h:"I had already eaten dinner when she arrived.",ok:true,explain:"'Had eaten' marks the earlier of two past events."},{h:"I ate dinner.",hint:"This only names one past action — no second event to compare timing to."}] },
        { prompt: "Which sentence shows a past action finished before a later point in the past?", options: [{h:"By noon, he had left the building.",ok:true,explain:"'Had left' places the leaving before the reference point, noon."},{h:"He left the building.",hint:"There's no second past moment here to compare timing to."}] },
        { prompt: "Which sentence signals an action completed before another past event?", options: [{h:"She had packed her bags before the taxi arrived.",ok:true,explain:"Packing happened, then the taxi arrived — 'had packed' marks the earlier one."},{h:"She packed her bags.",hint:"There's no second past event here to compare timing to."}] },
        { prompt: "Which sentence describes something that happened BEFORE another past event?", options: [{h:"The movie had already started when we got to the theater.",ok:true,explain:"The movie starting came before arriving — that's why it's 'had started'."},{h:"We got to the theater.",hint:"Only one event is named — nothing to compare the timing to."}] },
        { prompt: "Which sentence shows a past action finished before a later past event?", options: [{h:"They had finished the project before the deadline arrived.",ok:true,explain:"Finishing came before the deadline — 'had finished' marks the earlier event."},{h:"They finished the project.",hint:"There's no second past event to compare this to."}] },
        { prompt: "Which sentence describes something that happened BEFORE another past event?", options: [{h:"By the time I woke up, the sun had already risen.",ok:true,explain:"The sun rising happened before waking up — that's the 'had risen'."},{h:"The sun rose.",hint:"Only one event is described — nothing to compare timing to."}] },
        { prompt: "Which sentence shows a past action finished before a later past event?", options: [{h:"She had cleaned her room before her friends came over.",ok:true,explain:"Cleaning happened first, then the friends arrived."},{h:"Her friends came over.",hint:"This only names one event, with no earlier action to compare it to."}] },
        { prompt: "Which sentence describes something that happened BEFORE another past event?", options: [{h:"The train had left the station before we reached the platform.",ok:true,explain:"The train leaving came before reaching the platform."},{h:"We reached the platform.",hint:"Only one event — nothing to compare the timing to."}] },
        { prompt: "Which sentence shows a past action finished before a later past event?", options: [{h:"He had studied for hours before the test began.",ok:true,explain:"Studying happened first, then the test began."},{h:"He studied for hours.",hint:"There's no second past event here to compare timing to."}] },
        { prompt: "Which sentence describes something that happened BEFORE another past event?", options: [{h:"By the time the teacher arrived, the students had already lined up.",ok:true,explain:"Lining up happened before the teacher arrived — 'had lined up'."},{h:"The students lined up.",hint:"Only one event is named here, with no comparison point."}] }
      ],
      participles: [
        { prompt: `Which is the correct past participle of "write" (as in "She has ___ a letter")?`, options: [{h:"written",ok:true,explain:"'write' is irregular — its participle is 'written'."},{h:"writed",hint:"'write' is irregular — it doesn't just add -ed."}] },
        { prompt: `Which is the correct past participle of "go" (as in "They have ___ home")?`, options: [{h:"gone",ok:true,explain:"'go' is irregular — its participle is 'gone'."},{h:"goed",hint:"'go' is irregular — its participle is 'gone', not 'goed'."}] },
        { prompt: `Which is the correct past participle of "eat" (as in "He had ___ before we arrived")?`, options: [{h:"eaten",ok:true,explain:"'eat' is irregular — its participle is 'eaten'."},{h:"eated",hint:"'eat' is irregular — its participle is 'eaten', not 'eated'."}] },
        { prompt: `Which is the correct past participle of "take" (as in "She has ___ the bus every day this week")?`, options: [{h:"taken",ok:true,explain:"'take' is irregular — its participle is 'taken'."},{h:"taked",hint:"'take' is irregular — its participle is 'taken', not 'taked'."}] },
        { prompt: `Which is the correct past participle of "break" (as in "He has ___ his promise before")?`, options: [{h:"broken",ok:true,explain:"'break' is irregular — its participle is 'broken'."},{h:"breaked",hint:"'break' is irregular — its participle is 'broken', not 'breaked'."}] },
        { prompt: `Which is the correct past participle of "speak" (as in "They have ___ to the principal about it")?`, options: [{h:"spoken",ok:true,explain:"'speak' is irregular — its participle is 'spoken'."},{h:"speaked",hint:"'speak' is irregular — its participle is 'spoken', not 'speaked'."}] },
        { prompt: `Which is the correct past participle of "choose" (as in "We had already ___ our seats before the movie started")?`, options: [{h:"chosen",ok:true,explain:"'choose' is irregular — its participle is 'chosen'."},{h:"choosed",hint:"'choose' is irregular — its participle is 'chosen', not 'choosed'."}] },
        { prompt: `Which is the correct past participle of "freeze" (as in "The lake had ___ solid by January")?`, options: [{h:"frozen",ok:true,explain:"'freeze' is irregular — its participle is 'frozen'."},{h:"freezed",hint:"'freeze' is irregular — its participle is 'frozen', not 'freezed'."}] },
        { prompt: `Which is the correct past participle of "steal" (as in "Someone has ___ my pencil case")?`, options: [{h:"stolen",ok:true,explain:"'steal' is irregular — its participle is 'stolen'."},{h:"stealed",hint:"'steal' is irregular — its participle is 'stolen', not 'stealed'."}] },
        { prompt: `Which is the correct past participle of "fall" (as in "The leaves had already ___ by November")?`, options: [{h:"fallen",ok:true,explain:"'fall' is irregular — its participle is 'fallen'."},{h:"falled",hint:"'fall' is irregular — its participle is 'fallen', not 'falled'."}] }
      ],
      combine: [
        { prompt: "Choose the correct verb form. She ___ (finish) her project, so she's free tonight.", options: [{h:"has finished",ok:true,explain:"Present perfect — done, and it matters right now."},{h:"finish",hint:"This misses the has/have + participle construction entirely."},{h:"will finish",hint:"This describes the future, not something already done."}] },
        { prompt: "Choose the correct verb form. They ___ (see) that movie three times already.", options: [{h:"have seen",ok:true,explain:"Present perfect — an ongoing count that's still true now."},{h:"seen",hint:"'seen' needs a helper word — has/have — in front of it."},{h:"see",hint:"This is present tense, not present perfect."}] },
        { prompt: "Choose the correct verb form. By the time we got there, the show ___ (start) already.", options: [{h:"had started",ok:true,explain:"Past perfect — the show starting came before 'we got there'."},{h:"started",hint:"This doesn't show the show starting BEFORE another past moment."},{h:"has started",hint:"This is present perfect, but the sentence needs 'had' for past-before-past."}] },
        { prompt: "Choose the correct verb form. By the time she called, I ___ (leave) already.", options: [{h:"had left",ok:true,explain:"Past perfect — leaving happened before her call."},{h:"left",hint:"This doesn't show leaving happened before her call."},{h:"have left",hint:"This is present perfect, but the sentence needs 'had' for past-before-past."}] },
        { prompt: "Choose the correct verb form. He ___ (win) three trophies so far this year.", options: [{h:"has won",ok:true,explain:"Present perfect — an ongoing achievement that's still true now."},{h:"won",hint:"This misses the has/have + participle construction."},{h:"will win",hint:"This is future, but he already has the trophies."}] },
        { prompt: "Choose the correct verb form. They ___ (build) the treehouse before summer ended.", options: [{h:"had built",ok:true,explain:"Past perfect — building finished before summer ended."},{h:"built",hint:"This doesn't show this happened before another past moment."},{h:"have built",hint:"Present perfect doesn't fit — this needs 'had' for past-before-past."}] },
        { prompt: "Choose the correct verb form. We ___ (visit) that museum twice already.", options: [{h:"have visited",ok:true,explain:"Present perfect — an ongoing count still true now."},{h:"visited",hint:"This misses the has/have + participle construction."},{h:"will visit",hint:"This is future, but the visits already happened."}] },
        { prompt: "Choose the correct verb form. By the time the movie ended, I ___ (fall) asleep.", options: [{h:"had fallen",ok:true,explain:"Past perfect — falling asleep happened before the movie ended."},{h:"fell",hint:"This doesn't show falling asleep happened before the movie ended."},{h:"have fallen",hint:"Present perfect doesn't fit — this needs 'had'."}] },
        { prompt: "Choose the correct verb form. She ___ (break) her arm once before.", options: [{h:"has broken",ok:true,explain:"Present perfect — a past experience that's still relevant."},{h:"broke",hint:"This misses the has/have + participle construction."},{h:"will break",hint:"This is future, but it already happened."}] },
        { prompt: "Choose the correct verb form. By the time help arrived, the fire ___ (spread) through the whole building.", options: [{h:"had spread",ok:true,explain:"Past perfect — spreading happened before help arrived."},{h:"spread",hint:"This doesn't show the fire spreading happened before help arrived."},{h:"has spread",hint:"Present perfect doesn't fit — this needs 'had' for past-before-past."}] }

function wireOptions(container, onSubmit){
  let selected = null;
  const opts = container.querySelectorAll(".opt");
  const submitBtn = container.querySelector(".submit-row button");
  opts.forEach(btn => {
    btn.onclick = () => {
      opts.forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selected = Number(btn.dataset.i);
      submitBtn.disabled = false;
    };
  });
  submitBtn.onclick = () => {
    if(selected === null) return;
    onSubmit(selected);
  };
}

            return `<div class="skill-row current">
              <div class="skill-name">${skill.label}</div>
              <div class="skill-blurb">${skill.blurb}</div>
              <button class="btn skill-start-btn">Let's start</button>
            </div>`;
          } else {
            return `<div class="skill-row locked">
              <div class="skill-name">${skill.label}</div>
              <div class="skill-blurb">${skill.blurb}</div>
            </div>`;
          }
        }).join("")}
      </div>
    </div>`;
  const startBtn = stage.querySelector(".skill-start-btn");
  if(startBtn) startBtn.onclick = startNextSkill;
}

function startNextSkill(){
  if(skillIdx >= SKILL_ORDER.length){ renderAllDone(); return; }
  active = SCENARIOS[SKILL_ORDER[skillIdx]];
  diagState = { idx: 0, correct: 0 };
  renderDiagQuestion();
}

function returnToHub(){
  skillIdx++;
  if(skillIdx >= SKILL_ORDER.length){ renderAllDone(); } else { renderOnboarding(); }
}

function renderDiagQuestion(){
  const bank = active.QUESTION_BANK[active.topFullTopic];
  const raw = bank[diagState.idx];
  const q = { prompt: raw.prompt, options: shuffle(raw.options) };
  stage.innerHTML = `
    <div class="skill-chip">Diagnostic — ${active.label} · question ${diagState.idx+1} of ${DIAG_QUESTIONS}</div>
    <div class="prompt">${q.prompt}</div>
    ${q.options.map((o,i)=>`<button class="opt" data-i="${i}"><span class="key">${"ABCD"[i]}</span><span>${o.h}</span></button>`).join("")}
    <div class="submit-row"><button class="btn" disabled>Submit</button></div>`;
  wireOptions(stage, (i) => {
    const o = q.options[i];
    if(o.ok){ diagState.correct++; }
    diagState.idx++;
    if(diagState.idx >= DIAG_QUESTIONS){ finishDiagnostic(); }
    else { renderDiagQuestion(); }
  });
}

function finishDiagnostic(){
  const score = diagState.correct;
  if(score >= DIAG_QUESTIONS){ renderAppMismatch(); return; }
  if(score <= 1){ renderPrereqCheck(); return; }
  startLesson(5);
}

const MAX_PREREQ_LEVELS = 3;

function renderPrereqCheck(){
  const level1 = active.PREREQ[active.topFullTopic];
  if(!level1){ startLesson(10); return; }
  askPrereqLevel(1, level1, null);
}

function askPrereqLevel(level, topic, brokenAbove){
  const bank = active.QUESTION_BANK[topic];
  const raw = bank[0];
  const q = { prompt: raw.prompt, options: shuffle(raw.options) };
  stage.innerHTML = `
    <div class="skill-chip">Diagnostic — checking prerequisites (${level} of ${MAX_PREREQ_LEVELS})</div>
    <div class="prompt">Before we build practice on ${active.label.toLowerCase()}, one check on a step underneath it: ${active.TOPIC_TITLE[topic].toLowerCase()}.</div>
    <div class="prompt">${q.prompt}</div>
    ${q.options.map((o,i)=>`<button class="opt" data-i="${i}"><span class="key">${"ABCD"[i]}</span><span>${o.h}</span></button>`).join("")}
    <div class="submit-row"><button class="btn" disabled>Submit</button></div>`;
  wireOptions(stage, (i) => {
    const o = q.options[i];
    if(o.ok){
      if(brokenAbove){ startLesson(10, brokenAbove, true); }
      else { startLesson(10); }
      return;
    }
    const deeper = active.PREREQ[topic];
    if(level < MAX_PREREQ_LEVELS && deeper){ askPrereqLevel(level+1, deeper, topic); }
    else { startLesson(10, topic, true); }
  });
}

function renderAppMismatch(){
  stage.innerHTML = `
    <div class="diag">
      <span class="diag-cause ok">Good news</span>
      <h2>You know this — something else might be off</h2>
      <p>You got all ${DIAG_QUESTIONS} diagnostic questions right on <b>${active.label}</b>, but your recent practice scores in the app have been low. That mismatch usually points to something about the app itself — not your understanding.</p>
      <textarea class="feedback-input" id="feedbackText" rows="4" placeholder="What's been going wrong? Confusing questions, a glitch, wording that didn't make sense — anything helps."></textarea>
      <button class="btn" id="submitFeedback">Send feedback</button>
    </div>`;
  document.getElementById("submitFeedback").onclick = () => {
    const text = document.getElementById("feedbackText").value.trim();
    renderFeedbackThanks(text);
  };
}

function renderFeedbackThanks(text){
  stage.innerHTML = `
    <div class="diag">
      <span class="diag-cause ok">Thanks!</span>
      <h2>Got it — that helps a lot</h2>
      <p>${text ? "Your feedback has been sent to your campus DRI." : "No worries — you can always share more later."}</p>
      <div style="margin-top:22px;">
        <button class="btn" id="continueBtn">Continue →</button>
      </div>
    </div>`;
  document.getElementById("continueBtn").onclick = returnToHub;
}

/* ---------- Lesson generation + player ---------- */

const MAX_REGENS = 3;

function mkSection(topic, size){
  return { topic, title: active.TOPIC_TITLE[topic], q:0, correct:0, wrong:0, needed: size || QUESTIONS_PER_TOPIC,
    mastered:false, regenCount:0, inserted:false };
}

function startLesson(size, topicOverride, cameFromPrereqCheck){
  const topic = topicOverride || active.topFullTopic;
  const sec = mkSection(topic, size);
  sec.offset = topicOverride ? (cameFromPrereqCheck ? 1 : 0) : DIAG_QUESTIONS; // skip questions already asked
  if(topicOverride) sec.inserted = true;
  LS = { sections: [sec], idx: 0, inProbe:false };
  renderGenerating("Generating your practice…",
    `${size} question${size>1?"s":""} on ${active.TOPIC_TITLE[topic]}`, renderLesson);
}

function renderGenerating(title, cap, cb){
  stage.innerHTML = `<div class="gen"><div class="skill-chip">${title}</div><div class="bar"></div><div class="bar" style="width:82%"></div><div class="bar" style="width:64%"></div><div class="cap">${cap}</div></div>`;
  setTimeout(cb, 950);
}

function railHTML(){
  return `<div class="rail">${LS.sections.map((s,i)=>{
    const st = s.mastered ? "done" : i===LS.idx ? "active" : i<LS.idx ? "done" : "locked";
    const icon = st==="done" ? "✓" : st==="locked" ? "🔒" : (i+1);
    return `<div class="r ${st}"><span class="d">${icon}</span>${s.title}</div>`;
  }).join("")}</div>`;
}

function renderLesson(){
  const s = LS.sections[LS.idx];
  const th = active.THEORY[s.topic];
  let banner = "";
  if(s.regenCount>0) banner = `<div class="banner regen">Regenerated with a different approach (attempt ${s.regenCount+1} of ${MAX_REGENS+1}) — a different explanation this time.</div>`;
  else if(s.inserted) banner = `<div class="banner insert">Plan adjusted — inserted prerequisite: ${s.title}.</div>`;
  const explanation = th.approaches[Math.min(s.regenCount, th.approaches.length-1)];
  const regenLabel = s.regenCount >= MAX_REGENS ? "Still don't understand? Book a coaching call" : "I don't understand, regenerate explanation";
  stage.innerHTML = `
    ${railHTML()}
    ${banner}
    <h2 style="font-size:19px;font-weight:700;margin:4px 0 12px">${s.title}</h2>
    <div class="theory">${explanation}</div>
    <div class="steps-box"><b>Steps</b><ol>${th.steps.map(x=>`<li>${x}</li>`).join("")}</ol></div>
    <div class="example"><b>Worked examples</b><ul>${th.examples.map(x=>`<li>${x}</li>`).join("")}</ul></div>
    <button class="btn ghost" id="regenBtn" style="margin-bottom:18px">${regenLabel}</button>
    <div class="meter">Question <b>${s.q+1}</b> of ${s.needed} · <b>${s.correct}</b> correct so far</div>
    <div id="qarea"></div>`;
  document.getElementById("regenBtn").onclick = () => regenerateSection(s);
  renderQuestion();
}

function regenerateSection(s){
  if(s.regenCount >= MAX_REGENS){ renderEscalate(`Tried ${MAX_REGENS} different explanations for "${s.title}" and it's still not clicking.`); return; }
  s.regenCount++; s.correct = 0; s.wrong = 0; s.q = 0;
  renderGenerating("Regenerating this section…", "A different approach this time", renderLesson);
}

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderQuestion(){
  const s = LS.sections[LS.idx];
  const bank = active.QUESTION_BANK[s.topic];
  const raw = bank[(s.q + (s.offset||0)) % bank.length];
  const q = { prompt: raw.prompt, options: shuffle(raw.options) };
  const qa = document.getElementById("qarea");
  qa.innerHTML = `
    <div class="qcount">Question ${s.q+1} of ${s.needed}</div>
    <div class="prompt" style="font-size:16px">${q.prompt}</div>
    ${q.options.map((o,i)=>`<button class="opt" data-i="${i}"><span class="key">${"ABCD"[i]}</span><span>${o.h}</span></button>`).join("")}
    <div class="submit-row"><button class="btn" disabled>Submit</button></div>`;
  wireOptions(qa, (i) => submitAnswer(q, i));
}

function submitAnswer(q, i){
  const s = LS.sections[LS.idx];
  const opt = q.options[i];
  if(opt.ok) s.correct++; else s.wrong++;

  const qa = document.getElementById("qarea");
  qa.innerHTML = `
    <div class="qcount">Question ${s.q+1} of ${s.needed}</div>
    <div class="prompt" style="font-size:16px">${q.prompt}</div>
    ${q.options.map((o,idx)=>{
      let cls = "opt";
      if(idx===i) cls += opt.ok ? " chosen-correct" : " chosen-wrong";
      else if(o.ok && !opt.ok) cls += " reveal-correct";
      return `<button class="${cls}" disabled><span class="key">${"ABCD"[idx]}</span><span>${o.h}</span></button>`;
    }).join("")}
    <div class="feedback ${opt.ok?'good':'hint'}">${opt.ok ? (opt.explain || "Correct!") : (opt.hint || "Not quite.")}</div>
    <div class="submit-row"><button class="btn" id="nextBtn">Next →</button></div>`;
  document.getElementById("nextBtn").onclick = () => advanceQuestion(s);
}

function updateMeter(s){
  const m = stage.querySelector(".meter");
  if(m) m.innerHTML = `Question <b>${Math.min(s.q+1,s.needed)}</b> of ${s.needed} · <b>${s.correct}</b> correct so far`;
}

function advanceQuestion(s){
  s.q++;
  updateMeter(s);
  if(s.q >= s.needed){
    const passThreshold = Math.ceil(s.needed * 0.8);
    if(s.correct >= passThreshold){ masterSection(); }
    else { renderMiniProbe(); }
  } else {
    renderQuestion();
  }
}

function masterSection(){
  const s = LS.sections[LS.idx];
  s.mastered = true;
  if(LS.idx >= LS.sections.length-1){ renderLessonDone(); return; }
  LS.idx++;
  const ns = LS.sections[LS.idx];
  renderGenerating("Section mastered · preparing the next one…",
    `Pre-generated while you worked — ${ns.title}`, renderLesson);
}

function renderMiniProbe(){
  const s = LS.sections[LS.idx];
  stage.innerHTML = `
    ${railHTML()}
    <div class="banner insert">Accuracy on this section is low — one question to decide what to fix.</div>
    <div class="skill-chip">Re-diagnosing inside "${s.title}"</div>
    <div class="prompt" style="font-size:16px">Which feels closest to what's tripping you up on <b>${s.title.toLowerCase()}</b>?</div>
    <button class="opt" data-i="0"><span class="key">A</span><span>A smaller step underneath this one is shaky</span></button>
    <button class="opt" data-i="1"><span class="key">B</span><span>Honestly, I'm lost and just guessing</span></button>
    <button class="opt" data-i="2"><span class="key">C</span><span>Other</span></button>
    <textarea class="feedback-input" id="otherText" placeholder="Tell us what's going on..." style="display:none"></textarea>
    <div class="submit-row"><button class="btn" disabled>Submit</button></div>`;

  const opts = stage.querySelectorAll(".opt");
  const otherText = document.getElementById("otherText");
  const submitBtn = stage.querySelector(".submit-row button");
  let selected = null;

  const checkEnabled = () => {
    submitBtn.disabled = selected === 2 ? otherText.value.trim().length === 0 : selected === null;
  };
  opts.forEach(btn => {
    btn.onclick = () => {
      opts.forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selected = Number(btn.dataset.i);
      otherText.style.display = selected === 2 ? "block" : "none";
      checkEnabled();
    };
  });
  otherText.oninput = checkEnabled;
  submitBtn.onclick = () => {
    if(selected === null) return;
    if(selected === 0){ miniOutcome("insert"); }
    else if(selected === 1){ miniOutcome("escalate"); }
    else { miniOutcome("other", otherText.value.trim()); }
  };
}

function miniOutcome(outcome, text){
  const s = LS.sections[LS.idx];
  if(outcome==="insert"){
    const pre = active.PREREQ[s.topic];
    if(!pre){ renderEscalate("No prerequisite left below this — it's the drill floor."); return; }
    const nu = mkSection(pre); nu.inserted=true;
    LS.sections.splice(LS.idx, 0, nu);
    renderGenerating("Adjusting the plan…", `Inserting prerequisite: ${nu.title}`, renderLesson);
  } else if(outcome==="other"){
    renderEscalate(text ? `Student note: "${text}"` : "Selected 'Other' with no additional detail.");
  } else {
    renderEscalate("Still not clicking after practice.");
  }
}

function renderLessonDone(){
  stage.innerHTML = `
    ${railHTML()}
    <div class="diag">
      <span class="diag-cause ok">Section complete</span>
      <h2>Nice work — that's mastered</h2>
      <p>All ${LS.sections.length} section${LS.sections.length>1?"s":""} passed, ending with the re-climb to the original skill.</p>
      <div style="margin-top:22px;">
        <button class="btn" id="continueBtn">Continue →</button>
      </div>
    </div>`;
  document.getElementById("continueBtn").onclick = returnToHub;
}

function renderEscalate(reason){
  stage.innerHTML = `
    ${railHTML()}
    <div class="coach-card">
      <span class="diag-cause bad">Mandatory coaching call</span>
      <h2>Time to book a coaching call</h2>
      <p style="font-size:14px;color:var(--sub);margin-bottom:6px">${reason} As explained at the start: when practice alone isn't enough, the next step is a coaching call — <b>required, not optional.</b></p>
      <p style="font-size:13px;color:var(--mut);margin-bottom:4px">Available times this week:</p>
      <div class="slots">
        <div class="slot">Tue · 3:30 PM</div>
        <div class="slot">Tue · 4:15 PM</div>
        <div class="slot">Wed · 3:00 PM</div>
        <div class="slot">Thu · 3:45 PM</div>
      </div>
    </div>`;
}

function renderAllDone(){
  stage.innerHTML = `
    <div class="diag">
      <span class="diag-cause ok">All caught up</span>
      <h2>You're done for today</h2>
      <p>Both flagged skills are back above the mastery bar. Nice work.</p>
    </div>`;
}

renderOnboarding();
</script>
</body>
</html>
